        video {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .popup {
            position: fixed;
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-size: 16px;
            font-weight: bold;
            z-index: 10;
            opacity: 0;
            transform: scale(0);
            transition: all 0.5s ease-out;
            width: 160px;
            height: 50px;
            text-align: center;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .popup.show {
            opacity: 1;
            transform: scale(1);
        }

        .popup.hide-heart {
            opacity: 0;
            transform: scale(0);
            transition: all 0.8s ease-in;
        }

        .popup.random-show {
            opacity: 1;
            transform: scale(1);
            transition: all 0.4s ease-out;
        }

        .popup.random-hide {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.4s ease-in;
        }
    </style>

        function getHeartPositions(count) {
            const positions = [];
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const scale = Math.min(window.innerWidth, window.innerHeight) * 0.030;

            for (let i = 0; i < count; i++) {
                const t = (Math.PI * 2 * i) / count;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                
                positions.push({
                    x: centerX + x * scale - 90,
                    y: centerY + y * scale - 25
                });
            }

            return positions;
        }

        function createPopups() {
            const container = document.getElementById('popups-container');
            const positions = getHeartPositions(messages.length);

            const popups = messages.map((msg, index) => {
                const popup = document.createElement('div');
                popup.className = 'popup';
                popup.textContent = index === messages.length - 1 ? '记得天天开心 🌸' : msg;
                popup.style.color = fontColors[index % fontColors.length];
                popup.style.left = positions[index].x + 'px';
                popup.style.top = positions[index].y + 'px';
                container.appendChild(popup);
                return popup;
            });

            popups.forEach((popup, index) => {
                setTimeout(() => {
                    popup.classList.add('show');
                }, index * 150);
            });

            setTimeout(() => {
                hideHeartPopups(popups);
            }, messages.length * 150 + 3000);
        }

        function hideHeartPopups(popups) {
            popups.forEach(popup => {
                popup.classList.remove('show');
                popup.classList.add('hide-heart');
            });

            setTimeout(() => {
                popups.forEach(popup => popup.remove());
                startRandomPopups();
            }, 1000);
        }

        const MAX_POPUPS = 150;
        const POPUP_INTERVAL = 100;
        let activePopups = [];
        let messageIndex = 0;

        function startRandomPopups() {
            setInterval(() => {
                if (activePopups.length >= MAX_POPUPS) {
                    const randomIndex = Math.floor(Math.random() * activePopups.length);
                    const popupToRemove = activePopups[randomIndex];
                    popupToRemove.classList.remove('random-show');
                    popupToRemove.classList.add('random-hide');
                    
                    setTimeout(() => {
                        if (popupToRemove.parentNode) {
                            popupToRemove.remove();
                        }
                    }, 400);
                    
                    activePopups.splice(randomIndex, 1);
                }

                createRandomPopup();
            }, POPUP_INTERVAL);
        }

        function createRandomPopup() {
            const container = document.getElementById('popups-container');
            const popup = document.createElement('div');
            popup.className = 'popup';
            popup.textContent = messages[messageIndex % messages.length];
            popup.style.color = fontColors[messageIndex % fontColors.length];
            
            const maxX = window.innerWidth - 200;
            const maxY = window.innerHeight - 80;
            popup.style.left = Math.random() * maxX + 'px';
            popup.style.top = Math.random() * maxY + 'px';
            
            container.appendChild(popup);
            activePopups.push(popup);

            setTimeout(() => {
                popup.classList.add('random-show');
            }, 50);

            messageIndex++;
        }

        setTimeout(createPopups, 1000);
